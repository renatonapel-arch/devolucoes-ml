<svg width="1260" height="668" viewBox="0 0 1260 668" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  text{font-family:'Segoe UI',system-ui,Arial,sans-serif}
  .t{font-size:14px;font-weight:600;fill:#16202e}
  .th{font-size:14.5px;font-weight:700;fill:#0a3450}
  .ts{font-size:12px;fill:#6b7689}
  .c-blue rect{fill:#eef5ff;stroke:#2563eb}
  .c-amber rect{fill:#fff6e8;stroke:#d97706}
