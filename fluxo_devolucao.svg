<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="1260" height="668" fill="#ffffff"/>

<text class="th" x="30" y="22">Fluxo da devolução ML — 4 trilhas que correm em paralelo</text>
<text class="ts" x="30" y="40">Só é "concluída" quando as 4 trilhas fecham. É o espelho reverso da venda (Tiny → Heroku → SIGE → XML → etiqueta → expedição).</text>

<g class="c-blue"><rect x="330" y="54" width="280" height="40" rx="12" stroke-width="0.7"/><text class="t" x="470" y="76" text-anchor="middle">Devolução autorizada</text><text class="ts" x="470" y="90" text-anchor="middle">comprador devolve pós-entrega</text></g>
<g class="c-amber"><rect x="650" y="54" width="280" height="40" rx="12" stroke-width="0.7"/><text class="t" x="790" y="76" text-anchor="middle">Não-entrega / recusa</text><text class="ts" x="790" y="90" text-anchor="middle">volta sem reclamação</text></g>
<line x1="470" y1="94" x2="470" y2="112" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="790" y1="94" x2="790" y2="112" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="20" y="112" width="1240" height="92" rx="14" stroke-width="0.7"/></g>
<text class="th" x="40" y="134">🚚 Logística (ML) — onde está o produto</text>
<g class="c-blue"><rect x="40" y="146" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="130" y="166" text-anchor="middle">Comprador postou?</text><text class="ts" x="130" y="183" text-anchor="middle">não → ML fecha no prazo</text></g>
<g class="c-blue"><rect x="238" y="146" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="328" y="166" text-anchor="middle">Em trânsito</text><text class="ts" x="328" y="183" text-anchor="middle">a caminho do galpão</text></g>
<g class="c-green"><rect x="436" y="146" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="526" y="166" text-anchor="middle">Chegou 🔵 galpão</text><text class="ts" x="526" y="183" text-anchor="middle">vai pra conferência</text></g>
<g class="c-gray"><rect x="634" y="146" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="724" y="166" text-anchor="middle">🟢 CD do ML</text><text class="ts" x="724" y="183" text-anchor="middle">ML revisa · não chega</text></g>
<g class="c-red"><rect x="832" y="146" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="922" y="166" text-anchor="middle">🔴 EXTRAVIADO</text><text class="ts" x="922" y="183" text-anchor="middle">ML perdeu → reclamar p/ ML</text></g>
<g class="c-amber"><rect x="1030" y="146" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="1120" y="166" text-anchor="middle">Recusado → volta</text><text class="ts" x="1120" y="183" text-anchor="middle">vira não-entrega</text></g>
<line x1="220" y1="171" x2="238" y2="171" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="418" y1="171" x2="436" y2="171" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="20" y="214" width="1240" height="146" rx="14" stroke-width="0.7"/></g>
<text class="th" x="40" y="236">📦 Física / Conferência (login por perfil) — só as 🔵 chegam aqui</text>
<g class="c-blue"><rect x="40" y="248" width="180" height="48" rx="12" stroke-width="0.7"/><text class="t" x="130" y="267" text-anchor="middle">Recebido + bipado</text><text class="ts" x="130" y="283" text-anchor="middle">casa com a expedição</text></g>
<g class="c-blue"><rect x="238" y="248" width="180" height="48" rx="12" stroke-width="0.7"/><text class="t" x="328" y="267" text-anchor="middle">Provas de chegada</text><text class="ts" x="328" y="283" text-anchor="middle">fotos do lacrado</text></g>
<g class="c-blue"><rect x="436" y="248" width="180" height="48" rx="12" stroke-width="0.7"/><text class="t" x="526" y="267" text-anchor="middle">Abrir volume</text><text class="ts" x="526" y="283" text-anchor="middle">→ desfecho abaixo</text></g>
<line x1="220" y1="272" x2="238" y2="272" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="418" y1="272" x2="436" y2="272" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="318">Desfecho:</text>
<g class="c-green"><rect x="110" y="304" width="130" height="44" rx="11" stroke-width="0.7"/><text class="t" x="175" y="330" text-anchor="middle">✅ Certo OK</text></g>
<g class="c-amber"><rect x="250" y="304" width="130" height="44" rx="11" stroke-width="0.7"/><text class="t" x="315" y="330" text-anchor="middle">⚠️ Avariado</text></g>
<g class="c-red"><rect x="390" y="304" width="160" height="44" rx="11" stroke-width="0.7"/><text class="t" x="470" y="330" text-anchor="middle">🔄 Trocado / golpe</text></g>
<g class="c-amber"><rect x="560" y="304" width="130" height="44" rx="11" stroke-width="0.7"/><text class="t" x="625" y="330" text-anchor="middle">📉 Faltando</text></g>
<g class="c-red"><rect x="700" y="304" width="130" height="44" rx="11" stroke-width="0.7"/><text class="t" x="765" y="330" text-anchor="middle">📦 Caixa vazia</text></g>
<g class="c-blue"><rect x="858" y="304" width="352" height="44" rx="11" stroke-width="0.7"/><text class="t" x="1034" y="324" text-anchor="middle">📥 Estoque: volta / descarte / retido como prova</text><text class="ts" x="1034" y="339" text-anchor="middle">só volta a vender se reentrar no SIGE/Tiny</text></g>

<g class="c-gray"><rect x="20" y="370" width="1240" height="92" rx="14" stroke-width="0.7"/></g>
<text class="th" x="40" y="392">⚖️ Disputa (ML) — quando precisa reclamar</text>
<g class="c-gray"><rect x="40" y="404" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="130" y="424" text-anchor="middle">Sem reclamação</text><text class="ts" x="130" y="441" text-anchor="middle">desfecho OK</text></g>
<g class="c-purple"><rect x="238" y="404" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="328" y="424" text-anchor="middle">Abrir reclamação</text><text class="ts" x="328" y="441" text-anchor="middle">avaria SRF2 / diferente</text></g>
<g class="c-blue"><rect x="436" y="404" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="526" y="424" text-anchor="middle">🔵 Aguardando ML</text><text class="ts" x="526" y="441" text-anchor="middle">cronômetro ⏱️</text></g>
<g class="c-purple"><rect x="634" y="404" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="724" y="424" text-anchor="middle">Resolvido</text><text class="ts" x="724" y="441" text-anchor="middle">✔ ganhamos / ✘ perdemos</text></g>
<line x1="418" y1="429" x2="436" y2="429" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="616" y1="429" x2="634" y2="429" stroke="#9aa4b6" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M420 348 C420 378 328 378 328 404" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="20" y="472" width="1240" height="92" rx="14" stroke-width="0.7"/></g>
<text class="th" x="40" y="494">💰 Financeiro + Fiscal (SIGE / MP) — reconcilia com a venda original</text>
<g class="c-amber"><rect x="40" y="506" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="130" y="526" text-anchor="middle">MP reembolsou?</text><text class="ts" x="130" y="543" text-anchor="middle">sim / não / parcial</text></g>
<g class="c-blue"><rect x="238" y="506" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="328" y="526" text-anchor="middle">NF de devolução</text><text class="ts" x="328" y="543" text-anchor="middle">SIGE / ML / não</text></g>
<g class="c-blue"><rect x="436" y="506" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="526" y="526" text-anchor="middle">Financeiro da venda</text><text class="ts" x="526" y="543" text-anchor="middle">aberto / baixado</text></g>
<g class="c-blue"><rect x="634" y="506" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="724" y="526" text-anchor="middle">Compensação</text><text class="ts" x="724" y="543" text-anchor="middle">venda × devolução</text></g>
<g class="c-amber"><rect x="832" y="506" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="922" y="526" text-anchor="middle">Frete + comissão ML</text><text class="ts" x="922" y="543" text-anchor="middle">recuperação real</text></g>
<g class="c-red"><rect x="1030" y="506" width="180" height="50" rx="12" stroke-width="0.7"/><text class="t" x="1120" y="526" text-anchor="middle">Perda / sinistro</text><text class="ts" x="1120" y="543" text-anchor="middle">extravio · seguro</text></g>

<g class="c-green"><rect x="330" y="576" width="600" height="42" rx="12" stroke-width="0.9"/><text class="t" x="630" y="596" text-anchor="middle">✅ Concluída = as 4 trilhas fechadas</text><text class="ts" x="630" y="610" text-anchor="middle">+ reputação ML registrada</text></g>

<g class="c-green"><rect x="40" y="640" width="13" height="13" rx="3" stroke-width="0.7"/></g><text class="ts" x="60" y="650">bom desfecho</text>
<g class="c-red"><rect x="180" y="640" width="13" height="13" rx="3" stroke-width="0.7"/></g><text class="ts" x="200" y="650">perda / golpe / risco</text>
<g class="c-amber"><rect x="370" y="640" width="13" height="13" rx="3" stroke-width="0.7"/></g><text class="ts" x="390" y="650">atenção / parcial</text>
<g class="c-blue"><rect x="540" y="640" width="13" height="13" rx="3" stroke-width="0.7"/></g><text class="ts" x="560" y="650">processo / etapa</text>
<g class="c-gray"><rect x="710" y="640" width="13" height="13" rx="3" stroke-width="0.7"/></g><text class="ts" x="730" y="650">neutro / não se aplica</text>
